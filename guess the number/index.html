<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="main-container">
			<header>
				<section class="section-1">
					<button type="button" class="again">Again!</button>
					<h2>(Between 1 and 20)</h2>
				</section>
			</header>
			<main>
				<section class="section-2">
					<h1>Guess My Number!</h1>
					<div class="secret-number-section">
						<hr />
						<h2 class="secret-number">?</h2>
					</div>
				</section>

				<section class="section-3">
					<section class="left-section">
						<input type="number" min="1" max="20" class="input-number" />
						<button type="button" class="check">Check!</button>
					</section>
					<section class="right-section">
						<p class="message">Start guessing...</p>
						<p>💯 Score: <span class="label-score">20</span></p>
						<p>🥇 Highscore: <span class="label-highscore">0</span></p>
					</section>
				</section>
			</main>
		</div>
		<a
			href="../index.html"
			style="
				position: absolute;
				top: 20px;
				left: 20px;
				z-index: 100;
				background: #333;
				color: white;
				padding: 5px 15px;
				text-decoration: none;
				border-radius: 20px;
				font-size: 14px;
			"
			>← Back</a
		>
		<script src="script.js"></script>
	</body>
</html>
