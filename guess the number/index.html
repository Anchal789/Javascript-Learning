<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
			rel="stylesheet"
		/>
	</head>
	<style>
		body {
			background-color: #151b23;
			color: white;
			margin: 0;
			padding: 0;
			position: relative;
			height: 100vh;
		}
		* {
			font-family: "Press Start 2P", system-ui;
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		.main-container {
			margin: auto;
			max-width: 50%;
			border: 1px solid white;
			padding: 20px;
			border-radius: 10px;
			background: linear-gradient(
				90deg,
				rgba(0, 183, 255, 1) 0%,
				rgba(144, 111, 195, 1) 100%
			);
			height: 100%;
			z-index: 0;
		}
		button {
			background-color: white;
			border: none;
			font-size: xx-large;
			border-radius: 10px;
			padding: 10px;
			cursor: pointer;
		}
		button:hover {
			box-shadow: 0 0 10px #000;
		}
		.section-1 {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		.section-2 {
			margin-top: 200px;
			text-align: center;
		}
		.section-2 h1 {
			font-size: 40px;
		}
		.secret-number-section {
			position: relative;
			margin-top: 50px;
		}
		.secret-number-section hr {
			position: absolute;
			width: 100%;
			border: 1px solid white;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			z-index: 1;
			margin: 0;
		}
		.secret-number {
			background-color: white;
			margin: auto;
			color: black;
			padding: 10px;
			border-radius: 10px;
			width: 20%;
			height: 100px;
			display: flex;
			justify-content: center;
			align-items: center;
			font-size: 60px;
			z-index: 2;
			position: relative;
		}
		.section-3 {
			display: grid;
			grid-template-columns: 1fr 1fr;
			margin-top: 50px;
		}
		.left-section {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 30px;
		}
		.left-section input {
			width: 200px;
			padding: 10px;
			border-radius: 10px;
			border: none;
			text-align: center;
			font-size: xx-large;
			background-color: transparent;
			border: 1px solid white;
			color: white;
		}
		.right-section {
			display: flex;
			flex-direction: column;
			gap: 30px;
		}
	</style>
	<body>
		<div class="main-container">
			<header>
				<section class="section-1">
					<button type="button" class="again">Again!</button>
					<h2>(Between 1 and 20)</h2>
				</section>
			</header>
			<main>
				<section class="section-2">
					<h1>Guess My Number!</h1>
					<div class="secret-number-section">
						<hr />
						<h2 class="secret-number">?</h2>
					</div>
				</section>

				<section class="section-3">
					<section class="left-section">
						<input type="number" min="1" max="20" class="input-number" />
						<button type="button" class="check">Check!</button>
					</section>
					<section class="right-section">
						<p class="message">Start guessing...</p>
						<p>💯 Score: <span class="label-score">5</span></p>
						<p>🥇 Highscore: <span class="label-highscore">0</span></p>
					</section>
				</section>
			</main>
		</div>
		<script src="script.js"></script>
	</body>
</html>
